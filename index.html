<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Printn Design | Request a Quote</title>
    
    <!-- Google Fonts integration based on your JSON config -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS via CDN for rapid prototyping -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Applying your exact JSON design tokens to Tailwind config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff', 100: '#e0f2fe', 200: '#bae6fd',
                            300: '#7dd3fc', 400: '#38bdf8', 500: '#0ea5e9',
                            600: '#0284c7', 700: '#0369a1', 800: '#075985',
                            900: '#0c4a6e', 950: '#082f49'
                        },
                        accent: {
                            DEFAULT: '#F59E0B',
                            hover: '#D97706',
                            active: '#B45309'
                        },
                        gold: {
                            DEFAULT: '#D4AF37',
                            light: '#F3E5AB',
                            dark: '#AA8C2C'
                        },
                        neutral: {
                            DEFAULT: '#0F172A',
                            light: '#F8FAFC',
                            muted: '#94A3B8',
                            subtle: '#E2E8F0'
                        }
                    },
                    fontFamily: {
                        heading: ['"DM Serif Display"', 'serif'],
                        body: ['"Inter"', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 20px 40px -15px rgba(0,0,0,0.1)',
                        'deep': '0 35px 60px -15px rgba(0,0,0,0.25)',
                        'glow': '0 0 60px -15px rgba(245,158,11,0.3)'
                    },
                    borderRadius: {
                        'sm': '8px', 'md': '16px', 'lg': '24px', 'xl': '32px'
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .glass-card {
                @apply bg-white/80 backdrop-blur-md border border-white/20 shadow-soft rounded-lg;
            }
        }
        body {
            @apply font-body bg-neutral-light text-neutral antialiased;
        }
        h1, h2, h3, h4, h5, h6 {
            @apply font-heading tracking-[-0.02em] leading-[1.1];
        }
    </style>
</head>
<body class="min-h-screen p-6 md:p-12 flex flex-col items-center">

    <!-- Header -->
    <header class="w-full max-w-7xl mb-12 text-center">
        <h1 class="text-4xl md:text-5xl text-primary-900 mb-4">Printn Design</h1>
        <p class="text-neutral-muted font-body font-light text-lg">Bring your ideas to life with premium printing.</p>
    </header>

    <!-- Main Container for Form -->
    <main class="w-full max-w-3xl glass-card p-8 md:p-12">
        <h2 class="text-3xl mb-8 text-center">Request a Quote</h2>

        <form id="quoteForm" class="space-y-8" onsubmit="handleFormSubmit(event)">
            
            <!-- Step 1: Project Details -->
            <fieldset class="space-y-4">
                <legend class="text-xl font-heading text-primary-700 mb-4 border-b pb-2 w-full">1. Project Basics</legend>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Service Type *</label>
                        <select id="serviceType" required class="p-3 border border-neutral-subtle rounded-md focus:outline-none focus:ring-2 focus:ring-primary-400">
                            <option value="">Select a service...</option>
                            <option value="signage">Signage</option>
                            <option value="stickers">Stickers</option>
                            <option value="branding">Branding</option>
                            <option value="packaging">Packaging</option>
                            <option value="vehicle-wraps">Vehicle Wraps</option>
                            <option value="large-format">Large Format</option>
                        </select>
                    </div>

                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Project Type *</label>
                        <select id="projectType" required class="p-3 border border-neutral-subtle rounded-md focus:outline-none focus:ring-2 focus:ring-primary-400">
                            <option value="">Select a type...</option>
                            <option value="personal">Personal</option>
                            <option value="business">Business</option>
                            <option value="corporate">Corporate</option>
                            <option value="event">Event</option>
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Step 2: Dimensions & Materials -->
            <fieldset class="space-y-4">
                <legend class="text-xl font-heading text-primary-700 mb-4 border-b pb-2 w-full">2. Specifications</legend>
                
                <div class="grid grid-cols-3 gap-4">
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Width</label>
                        <input type="number" id="width" min="0.1" max="100" step="0.1" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Height</label>
                        <input type="number" id="height" min="0.1" max="100" step="0.1" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Unit</label>
                        <select id="unit" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                            <option value="cm">cm</option>
                            <option value="m">m</option>
                            <option value="ft">ft</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Quantity *</label>
                        <input type="number" id="quantity" required min="1" max="10000" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Material Details</label>
                        <input type="text" id="material" placeholder="e.g., Matte Vinyl" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                </div>
            </fieldset>

            <!-- Step 4: Contact (Combined step 3&4 for brevity) -->
            <fieldset class="space-y-4">
                <legend class="text-xl font-heading text-primary-700 mb-4 border-b pb-2 w-full">3. Your Information</legend>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Full Name *</label>
                        <input type="text" id="name" required class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Email Address *</label>
                        <input type="email" id="email" required class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Phone Number *</label>
                        <input type="tel" id="phone" required placeholder="+971..." class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                    <div class="flex flex-col">
                        <label class="text-sm font-medium mb-1">Company (Optional)</label>
                        <input type="text" id="company" class="p-3 border border-neutral-subtle rounded-md focus:ring-2 focus:ring-primary-400">
                    </div>
                </div>

                <div class="flex items-center space-x-2 mt-4">
                    <input type="checkbox" id="agreeTerms" required class="w-4 h-4 text-primary-600 focus:ring-primary-500 border-neutral-subtle rounded">
                    <label for="agreeTerms" class="text-sm text-neutral-muted">I agree to the terms and conditions.</label>
                </div>
            </fieldset>

            <!-- Submit Error Output -->
            <div id="errorBox" class="hidden p-4 bg-red-50 text-red-600 border border-red-200 rounded-md text-sm"></div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-accent hover:bg-accent-hover text-white font-medium py-4 px-8 rounded-md transition-colors shadow-glow text-lg">
                Submit Quote Request
            </button>
        </form>
    </main>

    <!-- JavaScript mimicking your Zod Validations and Rate Limiter setup -->
    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            const errorBox = document.getElementById('errorBox');
            errorBox.classList.add('hidden');
            errorBox.innerHTML = '';

            // Collect Data
            const data = {
                serviceType: document.getElementById('serviceType').value,
                projectType: document.getElementById('projectType').value,
                width: parseFloat(document.getElementById('width').value),
                height: parseFloat(document.getElementById('height').value),
                quantity: parseInt(document.getElementById('quantity').value, 10),
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                agreeTerms: document.getElementById('agreeTerms').checked
            };

            // Custom Validation (Mimicking Zod Schema)
            let errors = [];

            // Email/Phone Regex Matchers
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const phoneRegex = /^\+?[1-9]\d{1,14}$/;

            if (data.name.length < 2) errors.push("Name must be at least 2 characters.");
            if (!emailRegex.test(data.email)) errors.push("Please enter a valid email address.");
            if (!phoneRegex.test(data.phone)) errors.push("Please enter a valid phone number.");
            if (data.quantity > 10000) errors.push("Maximum quantity is 10000.");
            if (!data.agreeTerms) errors.push("You must agree to the terms.");

            // Display Errors or Succeed
            if (errors.length > 0) {
                errorBox.innerHTML = '<ul>' + errors.map(e => `<li>• ${e}</li>`).join('') + '</ul>';
                errorBox.classList.remove('hidden');
            } else {
                // Mimic successful API Call
                const btn = event.target.querySelector('button[type="submit"]');
                const originalText = btn.innerText;
                btn.innerText = "Sending...";
                btn.disabled = true;
                btn.classList.add('opacity-75', 'cursor-not-allowed');

                setTimeout(() => {
                    alert("Success! Your quote has been submitted securely.");
                    event.target.reset();
                    btn.innerText = originalText;
                    btn.disabled = false;
                    btn.classList.remove('opacity-75', 'cursor-not-allowed');
                }, 1500);
            }
        }
    </script>
</body>
</html>
